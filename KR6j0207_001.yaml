body:
  text: 宋西域沙門功德直共玄暢譯如是我聞一時佛住毗舍離大林重閣與大比丘衆一千二百五十人俱是時世尊默然自念化緣將畢應捨壽行却後三月當般涅槃爾時如來即於是處便敕長老大目乾連汝往遍告大千世界諸比丘衆一時令集目連白佛唯然奉教一念之頃到須彌頂宣大音聲普聞大千即有四十百千比丘忽然來集大林重閣是諸比丘既見世尊頂禮佛足却住一面時舍利弗即生念言我今亦應以神通力往至三千大千世界諸比丘僧所住之處遍告一切行聲聞乘辟支佛乘學大乘者皆當令集大林重閣時舍利弗即以神力往三千大千世界諸比丘僧所住之處宣告一切行聲聞乘辟支佛乘求大乘者今可皆集大林重閣時諸大衆即如其言到已稽首却住一面爾時世尊告諸菩薩汝等即時皆應來集時不空見菩薩文殊師利菩薩不捨惡趣菩薩斷一切憂惛菩薩施一切菩薩除一切礙菩薩觀世音菩薩香象菩薩最高辨菩薩彌勒菩薩摩訶薩等同時俱來到如來所爾時世尊而告之曰諸善男子汝今可往十方恆沙諸佛剎土告衆菩薩摩訶薩等其有已得無生法忍及住不退諸餘菩薩乃至位階一生補處諸大菩薩咸使令集時諸菩薩即承聖旨遍至十方召諸菩薩彼諸大士既聞宣告皆稱善哉唯然敬諾時九萬億百千那由他諸菩薩等皆悉已得無生法忍復有三億百千那由他菩薩住不退轉又億百千諸大菩薩各各皆是一生補處如是一切諸菩薩等以神通力於一念頃皆悉來集大林重閣爾時大衆見世尊已頂禮佛足却住一面時舍利弗既見十方諸菩薩等皆悉來集即生念言我於今者當請如來應正遍知問如是相以我所問為斷一切諸菩薩疑得深智辨於恆沙佛所聞妙法未曾一念而生廢忘乃至未得無上菩提諸菩薩等皆應修是四淨妙行何謂為四一者衆生淨二者法淨三者辨淨四者佛土淨復令菩薩生四正念何謂為四正念於身正念於口正念於心正念於生復有四法漸得深入陀羅尼門何等為四一得無盡宣説善入陀羅尼門二知衆生諸根巧便逮得入於陀羅尼門三知有為業報巧便亦得入於陀羅尼門四得甚深無生法忍疾得善入陀羅尼門時舍利弗如其所念即白佛言此諸菩薩欲修淨行唯願世尊矜愍為説令得修行爾時佛告舍利弗言此諸行者發廣大心若欲修行菩薩法者又欲於法心無所著無取無捨是諸行者應當受持誦念如是陀羅尼呪神妙章句阿禰奴市反一阿企遣祇反二摩企三三曼跢都我反目企四育帝都絭反五尼陸帝六尼陸底都矢反七斯鞞蒲詣反八嘻許耆反隸九劫臂脯迷反十劫波伺十一娑隸十二婆羅跋帝十三嘻羅嘻利十四嘻隸嘻犁隸十五嘻羅嘻隸十六遮主何反帝十七遮槃禰十八遮羅遮羅禰十九遏恆帝二十阿蘭禰二十一涅未題徒隸反二十二涅跋多禰二十三昵闍殊何反帝二十四禰呵二十五毗摩隸二十六輸檀禰二十七跛羅盧可反訖帝都至反提般禰二十八婆𭒂𮐡餓反毗婆跋禰二十九阿僧祇三十陀迷莫計反三十一毗富羅斯鞞𮐡詣反三十二三迦釐沙禰三十三提隸提隸三十四摩呵提提隸三十五耶耆跋帝三十六遮隸三十七阿遮隸三十八摩陀隸三十九三蘇暫反摩遮隸四十致馱珊地四十一頞𤙈䨲質反帝四十二阿僧伽毗呵隸四十三阿僧伽尼呵隸四十四毗呵邏毗摩隸四十五膩呵邏輸檀膩四十六致芩蘇寐四十七咃彌四十八咃摩婆帝四十九摩呵斯鞞五十三曼哆斯鞞五十一毗富羅斯鞞五十二毗富羅剌盧轄反彌五十三三曼多目企五十四薩婆哆羺女留反竭帝五十五阿那眵姝支反豉五十六陀羅尼陀羅尼五十七尼陀那劬低莎波訶五十八爾時世尊告舍利弗我向所説陀羅尼呪此諸菩薩及以行者皆當受持讀誦通利而不應取有為無為於一切法無染無著亦勿誹謗心生厭離亦不攝受勤求修習若取有為無為諸法當速遠離不應執著不見法合不見法散不見法生不見法滅亦不見法有去來今不見法增不見法減不見十二因緣法起不見十二因緣法滅不宣説法非不宣説菩薩常應正念諸佛非色非無色非相非無相非義非不義非戒非不戒非定非不定非慧非不慧非解脫非不解脫非解脫知見非不解脫知見非族姓非不族姓非眷屬非不眷屬非行非不行非到非不到非時非不時非陰入界非不陰入界非智非不智非説法非不説法非我淨非他淨非衆生淨亦非不淨非自義非他義非法非律非身口淨亦非意淨又非過去來今行淨不為自不為他告舍利弗如是説者此則名為菩薩念佛皆悉攝入一切諸法名為永到諸法等集微妙總持又復名為第一義辨最勝無礙陀羅尼門亦名滿足一切諸願陀羅尼門又名必得菩提一分諸深三昧陀羅尼門又名辨攝諸餘善根陀羅尼門亦名法藏性相妙義真實之行陀羅尼門復名有為方便超過降伏諸魔陀羅尼門又舍利弗此陀羅尼名説無量法門是諸行者皆當獲此甚深義利疾得無上菩提之道所以者何是陀羅尼名為諸佛決定大乘一切功德甚深法藏是處名破一切衆生生死之行無染法戒陀羅尼門爾時世尊即説偈言無求於空法不戲論菩提隨順法界性速得陀羅尼勤聽習此經無盡陀羅尼於是得成就一切智明慧若欲求菩提持此陀羅尼以是行者得修習總持故即聞十方佛廣説諸法界既聞一切法深解第一義如彼日光耀明解亦如是以得修最勝微妙陀羅尼受持斯經故常得覩諸佛假使諸衆生經於一劫中欲得問難者行者悉能斷菩提辨如是不可得窮盡如此諸行者即是法王子已得近最勝無上菩薩道若樂聞此經當近是法師是諸佛世尊不但念行者亦愍諸衆生如慈母愛子此人行世間持是陀羅尼爾時即能見一億諸世尊若人億千劫先世造衆罪一月持此經其罪悉除滅一切諸世尊皆當授其手假使諸菩薩億劫積功德若能一月持如此陀羅尼所獲功德報其福過於彼三界諸衆生設使皆為魔無能沮壞此持陀羅尼者若行者憶念最上陀羅尼復能常誦持乃至得菩提説此陀羅尼是名決定持一切諸衆生即當於是處皆悉現前得無上菩提道聞是陀羅尼燈明佛所説即於俄頃間得覩恆沙佛若樂於諸佛及知其所在應修持是經皆即隨其意若欲得清淨最妙佛剎土光相甚明徹聲聞衆具足持此陀羅尼一切皆當得行者應精進七日七夜中思惟陀羅尼覩八十億佛不思於惡思亦不思異思專思如是經疾得陀羅尼譬如入大海更不求他寶得此陀羅尼終不願樂餘所以精此經欲近深菩提當得無上道到於寂滅處佛告舍利弗菩薩行者具足四法得陀羅尼何謂為四不著穢欲於諸衆生不起嫉妬施諸財物心無悔吝晝夜常樂修習善法又舍利弗菩薩具足如是四法得陀羅尼爾時世尊即説偈言棄彼污穢欲及捨鄙魔行如此欲因緣即是地獄趣於他親名利不生嫉妬心慈眼觀衆生得大威妙形衆生若諍訟皆由此身起是故應棄愛必得陀羅尼晝夜常求法一心樂菩提行者即能得如此陀羅尼常應現前修如是等四法爾時如來告舍利弗如此四法常應修學又舍利弗復有四法行者具此得陀羅尼何謂為四一者常當精勤修習阿蘭若行二者於彼甚深法忍堪任奉持三者不著利養名譽四者棄於一切所愛染著之處悉皆能捨乃至身命況餘財物舍利弗菩薩具足如此四法得陀羅尼爾時世尊即説偈言常修阿蘭若住於不放逸勤行深忍心當如救頭然斯行最殊勝諸佛之所讚不於他眷屬名譽利養等及以諸財物而生貪愛心少欲及知足如鳥無儲積既已得人身常應修衆善善哉得佛法出家棄苦本憍慢諸煩惱悉已得清淨應當勤恭敬尊重佛法僧貪利失念智亦喪信戒法去菩提甚遠是故應棄貪又舍利弗行者復應成就四法得陀羅尼何等為四有八字義云何為八所謂阿字是第一義一切諸法入無我義攞者相好此相好者入於如來法身之義婆者嬰兒嬰兒法者決定趣入聰慧之義闍者生老病死之患是生老等入無生滅迦者作業入無業報陀者總持陀羅尼法空無相願趣入法界奢者舍摩他毗婆舍那舍摩他等入一切法叉者諸法無住無盡亦無破壞又無前後如是諸法趣入涅槃如是八字皆入此義菩薩當隨而入之是則名為初第一法應善書寫精勤受持如是總持陀羅尼典是名行者入第二法半月半月應讀誦念如是總持陀羅尼法是名行者入第三法行者常應專心思念如是總持陀羅尼法令諸衆生皆悉歡喜誘引其意務使精敏是名行者入第四法舍利弗行者具足如是四法得此陀羅尼爾時世尊即説偈言書持陀羅尼思惟八字者若半月半月專勤常讀誦衆生於是處修習恆繼念親近於廣大菩提甚深智決定能現見十方一切佛是故於此法應修勤學心佛告舍利弗菩薩摩訶薩有四法利常當專習何謂為四一者正念十方諸佛二者究竟無諸魔事三者是人速離業障四者疾得無斷微妙甚深辨才又舍利弗如是四法行者應當專勤修習此陀羅尼必獲法利爾時世尊即説偈言應正念諸佛衆魔所不覺悉得速遠離一切諸業障亦獲無量億辨才陀羅尼佛告舍利弗乃往宿世無量無邊阿僧祇劫是時有佛號曰寶勝火聚光明如來應正遍知明行足善逝世間解無上士調御丈夫天人師佛世尊出現於世舍利弗寶勝火聚光明如來般涅槃時有轉輪王名曰星持七寶具足領四天下其王有子名不思議功德最勝而是王子至年一千六百歲時寶勝火聚光明佛所初得聞此陀羅尼法即便解悟專精修習經七萬歲晝夜不懈未曾疲怠目不暫閉王子復於七萬歲中捨身命財及以王位又七萬歲獨靜一處精勤經行脅不著地復於九億百千那由他諸如來所聞説法已皆悉受持讀誦通利王子即便出家修道經九萬歲受持成就如此無量陀羅尼門時此比丘成就是已廣為衆生宣示斯義比丘王子即於此生化八十億那由他百千衆生皆悉安住阿耨多羅三藐三菩提道亦復證於不退轉地又舍利弗爾時衆中有長者子名曰月幢是長者子於彼比丘法師所聞如此無量陀羅尼門聞已即便隨喜頂受月幢以此隨喜善根功德因緣值九十億諸佛世尊恭敬供養得此最上陀羅尼法於諸言論最為殊勝又獲第一不斷辨才王子比丘三劫供養是諸佛已得無上道又舍利弗勿生疑惑爾時王子比丘法師今無量壽如來是也爾時月幢定光佛是佛告舍利弗我與賢劫諸菩薩等俱共聞此陀羅尼法即生隨喜以此善根功德因緣經歷四十百千劫中常勤背捨生死之法於九十億諸如來所得陀羅尼最為第一言論超絶辨才殊勝又舍利弗是故行者若欲速得無上道者當受持此陀羅尼法若復不能受持書寫讀誦之者但生隨喜所以者何緣此善根令是行者必當獲得不退轉地至無上道何況受持書寫讀誦廣為他人敷演之者所得功德唯除如來一切衆生不能測量何況思惟廣為人説爾時世尊即説偈言得此陀羅尼名為無量門諸佛常護念魔不得其便業障衆塵勞皆速獲清淨聞此妙典已隨喜即書寫受持恆讀誦廣為人演説一切諸衆生不測其功德行者所生處常得見諸佛獲不思議信善解深經義是行者疾得最上菩提道三昧通無盡陀羅尼亦然形色恆具足福報常相繼見佛及聞法無時而暫缺未得菩提間永保斯功德我念宿世時已聞此總持見於恆沙佛得無上菩提譬如昔月幢得成定光佛過去功德勝法師比丘者今見無量光阿彌陀佛是我與賢劫中無量諸菩薩俱聞此經典深心共隨喜若樂速親近無上菩提道又樂疾降魔復樂百福嚴當勤心總持得此不為難若人以珍寶滿恆沙世界布施於一切皆使得豐足但能書此經其福過於彼是故應靜聽一心初不亂書寫與受持及以善思惟如此深妙典斯為智菩薩疾得於菩提不足以為難又告舍利弗若有行者專心繼念此陀羅尼有八夜叉住在雪山晝夜擁護如是行者除諸衰患益其勢力何者為八一名首羅宋言勇健二名緻栗馱堅固三名簸臘復多衆多四名那羅延婆邏大力士也五名那隸因馱羅人主六名突陀利沙五能誹謗七名迦羅邏嘊柴八名修婆睺好臂告舍利弗行者應當以好帛素圖畫如此八鬼神像以鮮綵色極令清淨不得雜用衆生之膠行者若欲讀誦此經先應沐浴著淨衣服專心祈請此八鬼神為設種種香潔飲食衆妙雜香散華華鬘及淨油燈以供養之行者復應綵畫於地如圓輪座自在其上右膝著地手執香爐一心慈念無量衆生七遍微誦陀羅尼呪是八鬼神即現其身欲界天中有菩薩是八大士見此行者敬誦如此陀羅尼時亦常護念益其勢力何者為八衆光菩薩智光菩薩日光菩薩問難菩薩一切願滿菩薩大力菩薩星王菩薩妙意菩薩是八菩薩及八鬼神令此行者一心專修得陀羅尼法利勢力使諸衆生皆愛念之一切所須隨意不乏百由旬內無諸衰患如是行者應當修陀羅尼發真實願憶念精勤愛樂一切善法分布施戒等心廣惠隨彼多少無所吝惜行者受持此陀羅尼又應尊重佛及法僧於三寶所恆生敬畏一心專修甚深法忍世尊説此陀羅尼時三千恆河沙百千億那由他諸菩薩等悉得此陀羅尼門名説無量又復證於不退轉地當得阿耨多羅三藐三菩提六十頻婆羅諸天人等未發無上菩提心者今皆悉發無上道意時舍利弗白佛言世尊何名斯經云何奉持告舍利弗此經名為無量門總持陀羅尼如是受持亦名摧破一切衆魔總持陀羅尼如是受持亦名菩薩一分超意總持陀羅尼如是受持亦名一分得一切智總持陀羅尼如是受持爾時世尊説此經已舍利弗等諸大聲聞菩薩人天修羅迦樓羅乾闥婆緊那羅摩睺羅伽一切世間聞佛所説歡喜踊躍頂戴受持作禮而退
